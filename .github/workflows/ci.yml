name: ESP-IDF CI/CD

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  ESP_TARGET: esp32s3
  IDF_VERSION: "v5.4.4"

jobs:
  build:
    name: Build (ESP-IDF)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ESP-IDF
        uses: espressif/install-esp-idf-action@v1
        with:
          version: ${{ env.IDF_VERSION }}

      - name: Print ESP-IDF version
        run: idf.py --version

      - name: Set target
        run: idf.py set-target $ESP_TARGET

      - name: Build project
        run: |
          set -o pipefail
          idf.py build 2>&1 | tee build_output.log

      - name: Surface build errors as annotations
        if: failure()
        run: |
          grep -E "(error:|undefined reference|FAILED:)" build_output.log | head -40 | \
            while IFS= read -r line; do echo "::error::${line}"; done
          echo "::error::--- last 30 lines of build output ---"
          tail -n 30 build_output.log | while IFS= read -r line; do echo "::error::${line}"; done

      - name: Run size info
        run: idf.py size

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp-idf-build
          if-no-files-found: error
          path: |
            build/esp32s3_modbus_rtu.bin
            build/esp32s3_modbus_rtu.elf
            build/esp32s3_modbus_rtu.map
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/flasher_args.json

  release-package:
    name: Package Release Artifacts
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: esp-idf-build
          path: release

      - name: Create release package
        run: tar -czf esp-idf-firmware-${{ github.ref_name }}.tar.gz -C release .

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.ref_name }}
          if-no-files-found: error
          path: esp-idf-firmware-${{ github.ref_name }}.tar.gz
